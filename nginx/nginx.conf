worker_processes  auto;

error_log  /dev/stderr warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # ── OpenResty Lua 설정 ────────────────────────────────────────────────────
    lua_package_path  "/etc/nginx/lua/?.lua;;";

    # ── 기본 설정 ─────────────────────────────────────────────────────────────
    default_type  application/octet-stream;

    # $ja3_hash 를 로그에 남겨 JA3 추출 여부를 즉시 확인할 수 있게 한다.
    log_format  main  '$remote_addr - [$time_local] "$request" $status '
                      'JA3=$ja3_hash';
    access_log  /dev/stdout  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── HTTP → HTTPS 리다이렉트 ───────────────────────────────────────────────
    server {
        listen 80;
        server_name orhskim.duckdns.org waf.orhskim.duckdns.org viewer.orhskim.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # ── WAF (waf.orhskim.duckdns.org) ────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name waf.orhskim.duckdns.org orhskim.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/orhskim.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/orhskim.duckdns.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # $ja3_hash 변수 선언 (Lua에서 ngx.var.ja3_hash 로 쓰기 위해 필요)
        set $ja3_hash "";

        # ── JA3 계산 (TLS ClientHello 수신 직후, HTTP 요청 전) ─────────────────
        # ngx.ctx 는 ssl_client_hello → HTTP request 단계까지 유지된다 (OpenResty 1.19.9.1+).
        # ngx.var 는 이 단계에서 사용 불가하므로 ngx.ctx 로 해시를 전달한다.
        ssl_client_hello_by_lua_block {
            local ok_clt, ssl_clt = pcall(require, "ngx.ssl.clienthello")
            if not ok_clt then
                ngx.log(ngx.ERR, "failed to load ngx.ssl.clienthello: ", ssl_clt)
                return
            end

            local ok_ja3, ja3 = pcall(require, "ja3")
            if not ok_ja3 then
                ngx.log(ngx.ERR, "failed to load ja3 module: ", ja3)
                return
            end

            local hash, ja3_str = ja3.compute(ssl_clt)
            if hash then
                ngx.ctx.ja3_hash = hash
                ngx.log(ngx.INFO, "JA3: ", hash, " (", ja3_str, ")")
            end
        }

        location / {
            # ngx.ctx.ja3_hash 를 HTTP 요청 헤더로 추가한 뒤 upstream 전달
            access_by_lua_block {
                local hash = ngx.ctx.ja3_hash or ""
                ngx.var.ja3_hash = hash
                ngx.req.set_header("X-JA3-Fingerprint", hash)
            }

            proxy_pass         http://rust-engine:8080;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Host             $host;

            proxy_request_buffering  on;
            client_max_body_size     10m;
            proxy_connect_timeout    5s;
            proxy_read_timeout       30s;
            proxy_send_timeout       30s;
        }
    }

    # ── 이벤트 뷰어 (viewer.orhskim.duckdns.org) ─────────────────────────────
    server {
        listen 443 ssl;
        server_name viewer.orhskim.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/orhskim.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/orhskim.duckdns.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://event-viewer:8081;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   Host             $host;
        }
    }
}
