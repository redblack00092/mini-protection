user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── HTTP → HTTPS 리다이렉트 ──────────────────────────────────────────────
    server {
        listen 80;
        server_name orhskim.duckdns.org waf.orhskim.duckdns.org viewer.orhskim.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # ── WAF (waf.orhskim.duckdns.org) ────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name waf.orhskim.duckdns.org orhskim.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/orhskim.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/orhskim.duckdns.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass         http://rust-engine:8080;

            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Host             $host;

            # JA3 TLS fingerprint: nginx 기본 빌드에는 $ssl_ja3 변수 없음
            # nginx-module-ja3 설치 후 아래 주석 해제:
            # proxy_set_header X-JA3-Fingerprint $ssl_ja3;
            # 현재는 빈 값 전달 → Rust 엔진 Pass 처리 (하위 호환)
            proxy_set_header   X-JA3-Fingerprint "";

            proxy_request_buffering  on;
            client_max_body_size     10m;

            proxy_connect_timeout    5s;
            proxy_read_timeout       30s;
            proxy_send_timeout       30s;
        }
    }

    # ── 이벤트 뷰어 (viewer.orhskim.duckdns.org) ─────────────────────────────
    server {
        listen 443 ssl;
        server_name viewer.orhskim.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/orhskim.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/orhskim.duckdns.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://event-viewer:8081;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   Host             $host;
        }
    }
}
