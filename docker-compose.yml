services:
  # ── 프론트 엔드 프록시 ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      rust-engine:
        condition: service_healthy
    restart: unless-stopped

  # ── WAF Rust 엔진 ────────────────────────────────────────────────────────
  rust-engine:
    build:
      context: ./rust-engine
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      RUST_LOG: "info"
      LISTEN_ADDR: "0.0.0.0:8080"
      UPSTREAM_URL: "http://backend:80"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "mini-protection-events"
      # 운영 환경에서는 반드시 교체할 것
      # 운영: .env 파일에 JS_TOKEN_SECRET=<random> 설정
      JS_TOKEN_SECRET: "${JS_TOKEN_SECRET:-change-me-in-production}"
      # reCAPTCHA v2 사이트 키 (없으면 CAPTCHA 페이지 위젯 미표시)
      CAPTCHA_SITE_KEY: "${CAPTCHA_SITE_KEY:-}"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/__mini-protection/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── 테스트용 백엔드 ──────────────────────────────────────────────────────
  backend:
    image: nginx:1.25-alpine
    expose:
      - "80"
    volumes:
      - ./backend/html:/usr/share/nginx/html:ro
    restart: unless-stopped

  # ── Zookeeper (Kafka 의존성) ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    expose:
      - "2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      JVMFLAGS: "-Xmx128m -Xms64m"
    mem_limit: 256m
    restart: unless-stopped

  # ── Kafka ────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    expose:
      - "9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    mem_limit: 384m
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
